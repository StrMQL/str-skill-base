# Build Skill Base Desktop (Tauri) on every push to main and publish installers
# to GitHub Releases so users can download without opening Actions artifacts.
name: Desktop Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS DMG
            node_target: darwin-arm64
            tauri_bundles: dmg
            artifact-name: desktop-macos
            upload-path: desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            label: Windows NSIS
            node_target: win-x64
            tauri_bundles: nsis
            artifact-name: desktop-windows
            upload-path: desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            label: Linux packages
            node_target: linux-x64
            tauri_bundles: appimage,deb
            artifact-name: desktop-linux
            upload-path: |
              desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop-tauri/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            desktop-tauri/pnpm-lock.yaml
            cli/pnpm-lock.yaml

      - name: Install CLI dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Install desktop-tauri dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "Apple signing secrets not configured; building unsigned macOS app."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Resolve macOS signing identity
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            exit 0
          fi
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            ID=$(security find-identity -v -p codesigning build.keychain \
              | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$ID" ]; then
              echo "No Developer ID Application identity in build.keychain" >&2
              exit 1
            fi
            echo "APPLE_SIGNING_IDENTITY=$ID" >> "$GITHUB_ENV"
          fi
          echo "Using signing identity: $APPLE_SIGNING_IDENTITY"

      - name: Install App Store Connect API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_PRIVATE_KEY:-}" ]; then
            echo "App Store Connect API key not configured; notarization may use APPLE_ID if set."
            exit 0
          fi
          mkdir -p "$HOME/.private_keys"
          KEY_PATH="$HOME/.private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s\n' "$APPLE_API_KEY_PRIVATE_KEY" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Tauri installers
        env:
          SKB_NODE_TARGET: ${{ matrix.node_target }}
          CI: true
          # macOS: signing + notarization when secrets are configured (see docs/desktop-macos-signing.md)
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          # Windows: keep unsigned unless you add WIN certificate secrets later
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'windows-latest' && 'false' || '' }}
        run: pnpm exec tauri build --bundles ${{ matrix.tauri_bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.upload-path }}
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: installers
          merge-multiple: true

      - name: Show installer files
        run: find installers -type f | sort

      - name: Remove previous desktop-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete desktop-latest --yes 2>/dev/null || true
          git push origin :refs/tags/desktop-latest 2>/dev/null || true

      - name: Create GitHub Release (desktop-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Skill Base Desktop
          prerelease: true
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            Tauri 桌面客户端自动构建（`main` @ [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})）。

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.exe`（NSIS） |
            | Linux | `.AppImage`、`.deb` |

            macOS：若仓库已配置 Apple 签名/公证 Secrets，DMG 已签名可正常打开；否则见 [docs/desktop-macos-signing.md](https://github.com/${{ github.repository }}/blob/main/docs/desktop-macos-signing.md)。Windows 可能触发 SmartScreen。

            历史构建见 [Releases](${{ github.server_url }}/${{ github.repository }}/releases)。
          files: |
            installers/**/*.dmg
            installers/**/*.exe
            installers/**/*.AppImage
            installers/**/*.deb
